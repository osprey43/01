# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: LOS-X
description: >
  LOS-X: Custom bootable Fedora Silverblue-based OSTree image.
  Includes GNOME desktop environment, core utilities (vim, git, micro),
  Starship shell prompt, and selected system-wide Flatpaks.
  Fully signed and optimized for atomic upgrades with rpm-ostree.

# Use the official bootable Silverblue base for GNOME
base-image: ghcr.io/ublue-os/silverblue
image-version: latest

modules:
  # Optional files to copy into the system
  - type: files
    files:
      - source: system
        destination: /

  # Install core system packages via rpm-ostree
  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - gnome-shell
        - gnome-terminal
        - nautilus
        - gnome-tweaks
        - vim
        - git
        - micro
        - starship
        - firefox

  # Remove any unneeded packages (optional)
    remove:
      packages:
        - firefox-langpacks # optional, if you prefer the Flatpak version

  # Install Flatpaks for all users and optionally per-user
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - org.gnome.Builder
          - org.gnome.gedit
          - org.gnome.Calculator
      - scope: user # user-level Flatpaks if desired

  # Signing module for signed images
  - type: signing
